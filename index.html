<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Transcriber | Secure Edge Compute</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .drag-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }
        
        /* Disabled UI States */
        .ui-locked { opacity: 0.5; pointer-events: none; filter: grayscale(50%); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 sm:px-6">

    <!-- Header -->
    <div class="max-w-5xl w-full flex flex-col gap-2 mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-white flex items-center justify-center gap-3">
            <i class="ph-fill ph-cpu text-blue-500"></i> Whisper Edge Compute
        </h1>
        <p class="text-slate-400 text-sm sm:text-base">WebGPU Acceleration • CPU Fallback (Q8) • Acoustic Gating</p>
    </div>

    <!-- Main Container -->
    <div class="max-w-5xl w-full bg-slate-800/80 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col">
        
        <div class="p-6 sm:p-8 flex-grow">
            <!-- Upload Zone -->
            <div id="drop-zone" class="ui-locked border-2 border-dashed border-slate-600 rounded-2xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all hover:border-slate-500 hover:bg-slate-700/30 group mb-6">
                <div class="bg-slate-700/50 p-4 rounded-full mb-3 group-hover:scale-105 transition-transform">
                    <i id="drop-icon" class="ph ph-hourglass-high text-3xl text-amber-400 animate-pulse"></i>
                </div>
                <h3 id="drop-title" class="text-lg font-medium mb-1 text-amber-400">Engine Initializing...</h3>
                <p id="drop-subtitle" class="text-slate-400 text-sm text-center">Please wait for the AI weights to load.</p>
                <input type="file" id="file-input" class="hidden" accept="audio/*,video/*">
            </div>

            <!-- Configuration Grid -->
            <div id="config-grid" class="ui-locked grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                
                <!-- Compute Device -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Hardware</label>
                    <div class="relative">
                        <select id="device-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer disabled:opacity-50">
                            <option value="wasm">CPU (Q8 WASM)</option>
                            <option value="webgpu" id="opt-webgpu">GPU (WebGPU) - Checking...</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <!-- AI Model -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">AI Model</label>
                    <div class="relative">
                        <select id="model-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="onnx-community/whisper-large-v3-turbo_timestamped" selected>Turbo (Timestamped)</option>
                            <option value="onnx-community/whisper-large-v3-turbo">Turbo (Phrase Only)</option>
                            <option value="Xenova/whisper-small">Small (Fastest CPU)</option>
                            <option value="Xenova/whisper-large-v3">Large-v3 Full (GPU Req.)</option>
                            <option value="custom">Custom HuggingFace ID</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                
                <!-- Timestamp Mode -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Timestamps</label>
                    <div class="relative">
                        <select id="timestamp-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="word" selected>Word-Level (Attentions)</option>
                            <option value="phrase">Phrase-Level (Standard)</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <!-- Language -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Language</label>
                    <div class="relative">
                        <select id="lang-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="en">English</option>
                            <option value="auto">Auto-Detect</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
            </div>

            <div id="custom-model-container" class="hidden mt-4 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Custom ONNX Model Repository</label>
                <input type="text" id="custom-model-input" placeholder="e.g., your-org/whisper-large-v3-turbo-attentions" class="w-full bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500">
            </div>

            <!-- UI Warning -->
            <div id="warning-box" class="hidden mt-4 bg-amber-500/10 border border-amber-500/20 text-amber-400 px-4 py-3 rounded-lg text-sm flex items-start gap-3 transition-all">
                <i class="ph-fill ph-warning-circle text-lg mt-0.5"></i>
                <p id="warning-text">Warning Text</p>
            </div>

            <!-- Granular Status Indicator -->
            <div id="status-container" class="mt-6 bg-slate-900/80 rounded-xl p-5 border border-slate-700 shadow-inner block">
                <div class="flex justify-between text-sm mb-3">
                    <span id="status-text" class="text-blue-400 font-medium flex items-center gap-2">
                        <i class="ph ph-spinner-gap animate-spin"></i> Preparing Engine Pipeline...
                    </span>
                    <span id="status-percentage" class="text-slate-400 font-mono">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden mb-3">
                    <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>
                
                <!-- FIX: Restored the missing subtext element -->
                <p id="status-subtext" class="text-xs text-slate-400 mt-2 text-center h-4"></p>

                <!-- Detailed File Tracker -->
                <div id="download-details" class="text-xs font-mono text-slate-500 space-y-1 max-h-24 overflow-y-auto custom-scrollbar mt-3"></div>
            </div>

            <!-- Output Area -->
            <div id="output-container" class="hidden mt-8 border-t border-slate-700 pt-8 fade-enter">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i class="ph-fill ph-check-circle text-emerald-500"></i> Transcription Ready
                    </h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button id="btn-copy" class="flex-1 sm:flex-none px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                            <i class="ph ph-copy"></i> Copy Text
                        </button>
                        <button id="btn-download-srt" class="flex-1 sm:flex-none px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium text-white transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                            <i class="ph ph-download-simple"></i> Download SRT
                        </button>
                    </div>
                </div>
                
                <div id="transcript-output" class="w-full max-h-96 bg-slate-900 rounded-xl border border-slate-700 p-5 overflow-y-auto text-slate-300 leading-relaxed text-sm font-mono space-y-2 shadow-inner custom-scrollbar">
                    <!-- Text chunks injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Web Worker Logic -->
    <script>
        const workerCode = `
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/dist/transformers.min.js';

            env.allowLocalModels = false;
            
            // Allow Multi-threading if headers exist (WASM specific)
            if (typeof SharedArrayBuffer !== 'undefined') {
                env.backends.onnx.wasm.numThreads = Math.min(navigator.hardwareConcurrency || 4, 8);
                self.postMessage({ status: 'log', message: \`WASM Threads Enabled: \${env.backends.onnx.wasm.numThreads}\` });
            } else {
                env.backends.onnx.wasm.numThreads = 1;
                self.postMessage({ status: 'log', message: 'WASM Threads Disabled (Single-thread fallback)' });
            }

            // SINGLETON PIPELINE ARCHITECTURE (Prevents Concurrent Deadlocks)
            let transcriberPromise = null;
            let loadedModelId = null;
            let loadedDeviceId = null;

            async function getPipelineInstance(model, computeDevice) {
                if (transcriberPromise && loadedModelId === model && loadedDeviceId === computeDevice) {
                    self.postMessage({ status: 'log', message: 'Returning cached pipeline instance.' });
                    return transcriberPromise;
                }
                
                self.postMessage({ status: 'log', message: \`Initializing new pipeline: \${model} on \${computeDevice}\` });
                loadedModelId = model;
                loadedDeviceId = computeDevice;
                
                // WebGPU uses mixed precision (FP32 Encoder, Q4 Decoder) to prevent VRAM exhaustion.
                // CPU uses pure Q8 to prevent WebAssembly 4GB heap exhaustion.
                const targetDtype = computeDevice === 'webgpu' 
                    ? { encoder_model: 'fp32', decoder_model_merged: 'q4' } 
                    : 'q8'; 
                
                self.postMessage({ status: 'log', message: \`Target precision (dtype): \${JSON.stringify(targetDtype)}\` });

                transcriberPromise = pipeline('automatic-speech-recognition', model, {
                    device: computeDevice, 
                    dtype: targetDtype, 
                    progress_callback: (info) => self.postMessage({ status: 'progress', info })
                });

                return transcriberPromise;
            }

            // Acoustic Onset Refiner
            function refineAcousticOnset(audioData, chunks, sampleRate = 16000) {
                self.postMessage({ status: 'log', message: 'Running Acoustic Gate Analysis...' });
                let refinedCount = 0;
                chunks.forEach((chunk) => {
                    let startSec = chunk.timestamp[0];
                    let endSec = chunk.timestamp[1] !== null ? chunk.timestamp[1] : startSec + 1.0;
                    
                    let startIdx = Math.floor(startSec * sampleRate);
                    let endIdx = Math.floor(endSec * sampleRate);

                    if (startIdx < 0) startIdx = 0;
                    if (endIdx > audioData.length) endIdx = audioData.length;
                    if (startIdx >= endIdx) return;

                    let preStartIdx = Math.max(0, startIdx - Math.floor(0.1 * sampleRate));
                    let noiseRMS = 0;
                    let count = 0;
                    for (let i = preStartIdx; i < startIdx; i++) {
                        noiseRMS += audioData[i] * audioData[i];
                        count++;
                    }
                    noiseRMS = count > 0 ? Math.sqrt(noiseRMS / count) : 0.001;

                    const windowSize = Math.floor(0.005 * sampleRate); 
                    const threshold = Math.max(noiseRMS * 1.5, 0.005); 

                    for (let i = startIdx; i < endIdx - windowSize; i += windowSize) {
                        let windowRMS = 0;
                        for (let j = 0; j < windowSize; j++) {
                            windowRMS += audioData[i + j] * audioData[i + j];
                        }
                        windowRMS = Math.sqrt(windowRMS / windowSize);

                        if (windowRMS > threshold) {
                            let refinedStart = (i / sampleRate) - 0.01;
                            if (refinedStart < endSec && refinedStart > chunk.timestamp[0]) {
                                chunk.timestamp[0] = Math.max(startSec, refinedStart);
                                refinedCount++;
                            }
                            break; 
                        }
                    }
                });
                self.postMessage({ status: 'log', message: \`Acoustic Refinement Complete. Trims applied: \${refinedCount}\` });
                return chunks;
            }

            self.onmessage = async (e) => {
                const { action, audio, model, computeDevice, timestampMode, lang } = e.data;

                if (action === 'init') {
                    try {
                        await getPipelineInstance(model, computeDevice);
                        self.postMessage({ status: 'ready' });
                    } catch (err) {
                        transcriberPromise = null; // Free lock on failure
                        self.postMessage({ status: 'error', message: err ? (err.message || err.toString()) : 'Unknown init error.' });
                    }
                }

                if (action === 'transcribe') {
                    try {
                        self.postMessage({ status: 'transcribing' });
                        const transcriber = await getPipelineInstance(model, computeDevice);
                        
                        self.postMessage({ status: 'log', message: 'Starting Inference execution...' });
                        const output = await transcriber(audio, {
                            chunk_length_s: 30,
                            stride_length_s: 5,
                            return_timestamps: timestampMode === 'word' ? 'word' : true, 
                            language: lang === 'auto' ? null : lang
                        });

                        if (timestampMode === 'word' && output.chunks) {
                            output.chunks = refineAcousticOnset(audio, output.chunks);
                        }

                        self.postMessage({ status: 'complete', result: output });
                    } catch (err) {
                        self.postMessage({ status: 'error', message: err ? (err.message || err.toString()) : 'Inference error.' });
                    }
                }
            };
        `;

        // -------------------------------------------------------------------
        // MAIN UI ORCHESTRATION & TELEMETRY
        // -------------------------------------------------------------------
        
        let worker;
        let isWorkerReady = false;
        let isProcessing = false;
        let finalTranscriptionResult = null;
        let hasWebGPU = false;

        const UI = {
            dropZone: document.getElementById('drop-zone'),
            dropIcon: document.getElementById('drop-icon'),
            dropTitle: document.getElementById('drop-title'),
            dropSubtitle: document.getElementById('drop-subtitle'),
            configGrid: document.getElementById('config-grid'),
            fileInput: document.getElementById('file-input'),
            deviceSelect: document.getElementById('device-select'),
            optWebGPU: document.getElementById('opt-webgpu'),
            modelSelect: document.getElementById('model-select'),
            customModelContainer: document.getElementById('custom-model-container'),
            customModelInput: document.getElementById('custom-model-input'),
            timestampSelect: document.getElementById('timestamp-select'),
            langSelect: document.getElementById('lang-select'),
            warningBox: document.getElementById('warning-box'),
            warningText: document.getElementById('warning-text'),
            statusContainer: document.getElementById('status-container'),
            statusText: document.getElementById('status-text'),
            statusSubtext: document.getElementById('status-subtext'), // RESTORED!
            statusPercentage: document.getElementById('status-percentage'),
            progressBar: document.getElementById('progress-bar'),
            downloadDetails: document.getElementById('download-details'),
            outputContainer: document.getElementById('output-container'),
            transcriptOutput: document.getElementById('transcript-output')
        };

        function lockUI() {
            isWorkerReady = false;
            UI.dropZone.classList.add('ui-locked');
            UI.configGrid.classList.add('ui-locked');
            UI.dropIcon.className = "ph ph-hourglass-high text-3xl text-amber-400 animate-pulse";
            UI.dropTitle.innerText = "Engine Initializing...";
            UI.dropTitle.className = "text-lg font-medium mb-1 text-amber-400";
            UI.dropSubtitle.innerText = "Please wait. Processing AI weights...";
            UI.statusContainer.classList.remove('hidden');
        }

        function unlockUI() {
            isWorkerReady = true;
            UI.dropZone.classList.remove('ui-locked');
            UI.configGrid.classList.remove('ui-locked');
            UI.dropIcon.className = "ph ph-upload-simple text-3xl text-blue-400";
            UI.dropTitle.innerText = "Click or Drag to Upload";
            UI.dropTitle.className = "text-lg font-medium mb-1 text-white";
            UI.dropSubtitle.innerText = "Supports MP4, WebM, MP3, WAV.";
            
            setTimeout(() => { if(!isProcessing) UI.statusContainer.classList.add('hidden'); }, 2000);
        }

        // WebGPU Capability Check
        async function checkWebGPU() {
            console.log("[Main] Checking WebGPU compatibility...");
            if (!navigator.gpu) {
                console.warn("[Main] WebGPU not supported by this browser.");
                UI.optWebGPU.innerText = "GPU (WebGPU) - Not Supported";
                UI.optWebGPU.disabled = true;
                return;
            }
            try {
                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) throw new Error();
                console.log("[Main] WebGPU Adapter successfully acquired.");
                UI.optWebGPU.innerText = "GPU (WebGPU Acceleration)";
                hasWebGPU = true;
                UI.deviceSelect.value = 'webgpu';
            } catch (e) {
                console.warn("[Main] WebGPU requestAdapter failed.");
                UI.optWebGPU.innerText = "GPU (WebGPU) - Unavailable";
                UI.optWebGPU.disabled = true;
            }
        }

        function validateConfiguration(changedElement) {
            UI.warningBox.classList.add('hidden');
            UI.customModelContainer.classList.add('hidden');

            const isCPU = UI.deviceSelect.value === 'wasm';
            const model = UI.modelSelect.value;
            const isWordLevel = UI.timestampSelect.value === 'word';

            if (model === 'custom') {
                UI.customModelContainer.classList.remove('hidden');
            }

            if (model === 'onnx-community/whisper-large-v3-turbo' && isWordLevel) {
                UI.warningBox.classList.remove('hidden');
                if (changedElement === 'model') {
                    UI.timestampSelect.value = 'phrase';
                    UI.warningText.innerHTML = "<b>Turbo (Phrase Only)</b> lacks Word-Level attentions. Switched to Phrase-Level.";
                } else {
                    UI.modelSelect.value = 'onnx-community/whisper-large-v3-turbo_timestamped';
                    UI.warningText.innerHTML = "<b>Word-Level</b> requires attentions. Auto-switched to <b>Turbo (Timestamped)</b>.";
                }
            }

            if (model === 'Xenova/whisper-large-v3' && isCPU) {
                UI.warningBox.classList.remove('hidden');
                if (changedElement === 'model') {
                    if (hasWebGPU) {
                        UI.deviceSelect.value = 'webgpu';
                        UI.warningText.innerHTML = "<b>Large-v3 Full</b> exceeds CPU memory. Auto-switched to <b>WebGPU VRAM</b>.";
                    } else {
                        UI.modelSelect.value = 'onnx-community/whisper-large-v3-turbo_timestamped';
                        UI.warningText.innerHTML = "<b>Large-v3 Full</b> exceeds CPU memory. Auto-switched to <b>Turbo (Timestamped)</b>.";
                    }
                } else {
                    UI.modelSelect.value = 'onnx-community/whisper-large-v3-turbo_timestamped';
                    UI.warningText.innerHTML = "CPU cannot handle the Full Large-v3 model. Auto-switched to <b>Turbo (Timestamped)</b>.";
                }
            }
            
            // Re-initialize engine if configs changed
            if (changedElement !== 'init' && worker && !isProcessing) {
                initWorker();
            }
        }

        UI.deviceSelect.addEventListener('change', () => validateConfiguration('device'));
        UI.modelSelect.addEventListener('change', () => validateConfiguration('model'));
        UI.timestampSelect.addEventListener('change', () => validateConfiguration('timestamp'));

        function initWorker() {
            const actualModel = UI.modelSelect.value === 'custom' ? UI.customModelInput.value.trim() : UI.modelSelect.value;
            if (UI.modelSelect.value === 'custom' && !actualModel) return;

            console.log(`[Main] Initiating Worker pipeline for model: ${actualModel}`);
            lockUI();
            downloadTracker = {}; 
            isCompiling = false;

            if (!worker) {
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                worker = new Worker(URL.createObjectURL(blob), { type: 'module' });
                setupWorkerListeners();
            }

            updateStatus('Booting Pipeline...', 0, 'Verifying cache or downloading model weights...');
            if (UI.downloadDetails) UI.downloadDetails.innerHTML = ''; 
            
            worker.postMessage({ 
                action: 'init', 
                model: actualModel,
                computeDevice: UI.deviceSelect.value 
            });
        }

        function setupWorkerListeners() {
            worker.onmessage = (e) => {
                const { status, info, message, result } = e.data;
                switch(status) {
                    case 'log': 
                        console.log(`[Worker] ${message}`);
                        break;
                    case 'progress': 
                        handleModelProgress(info); 
                        break;
                    case 'ready':
                        console.log(`[Main] Worker reported pipeline is READY.`);
                        updateStatus('Compute Pipeline Ready', 100, `Using ${UI.deviceSelect.value.toUpperCase()}`);
                        unlockUI();
                        break;
                    case 'transcribing':
                        updateStatus('Processing Audio...', null, 'Running neural network inference...');
                        UI.transcriptOutput.innerHTML = ''; 
                        UI.outputContainer.classList.remove('hidden');
                        UI.outputContainer.classList.add('fade-enter-active');
                        break;
                    case 'complete': 
                        handleTranscriptionComplete(result); 
                        break;
                    case 'error':
                        console.error(`[Worker Error] ${message}`);
                        updateStatus(`Pipeline Error`, 0, message);
                        if(UI.progressBar) UI.progressBar.classList.add('bg-red-500');
                        isProcessing = false;
                        unlockUI();
                        break;
                }
            };

            worker.onerror = (err) => {
                console.error(`[Fatal Worker Crash]`, err);
                updateStatus('Fatal Worker Crash', 0, 'The background engine was forcefully terminated. This is usually caused by an Out-Of-Memory limit. Try selecting a smaller model.');
                if(UI.progressBar) UI.progressBar.classList.add('bg-red-500');
                isProcessing = false;
                unlockUI(); 
            };
        }

        let downloadTracker = {};
        let isCompiling = false;

        function handleModelProgress(info) {
            if (info.status === 'initiate' || info.status === 'download') {
                downloadTracker[info.file] = { status: 'downloading', loaded: 0, total: 0, percentage: 0 };
            } 
            else if (info.status === 'progress') {
                if (!downloadTracker[info.file]) downloadTracker[info.file] = { loaded: 0, total: 0 };
                downloadTracker[info.file].loaded = info.loaded;
                downloadTracker[info.file].total = info.total;
                downloadTracker[info.file].percentage = info.total > 0 ? Math.round((info.loaded / info.total) * 100) : 0;
            } 
            else if (info.status === 'done') {
                if (!downloadTracker[info.file]) downloadTracker[info.file] = { total: 100, loaded: 100 };
                downloadTracker[info.file].percentage = 100;
                downloadTracker[info.file].status = 'done';
            }
            else if (info.status === 'ready') {
                isCompiling = true;
                updateStatus('Compiling Graph...', null, 'Optimizing ONNX execution graph. This may take a minute...');
                return;
            }

            let totalWeights = 0, loadedWeights = 0;
            let allDone = true;
            let detailHTML = '';

            for (const [file, data] of Object.entries(downloadTracker)) {
                if (data.total) { 
                    totalWeights += data.total; 
                    loadedWeights += data.loaded; 
                }
                if (data.percentage !== 100) allDone = false;
                
                const mbLoaded = (data.loaded / 1024 / 1024).toFixed(1);
                const mbTotal = data.total ? (data.total / 1024 / 1024).toFixed(1) : '??';
                
                detailHTML += `<div class="flex justify-between border-b border-slate-800/50 py-1">
                    <span class="truncate pr-4">${file}</span>
                    <span class="${data.percentage === 100 ? 'text-emerald-400' : 'text-blue-400'} whitespace-nowrap">
                        ${data.percentage === 100 ? 'Complete' : `${mbLoaded} / ${mbTotal} MB (${data.percentage}%)`}
                    </span>
                </div>`;
            }

            if (UI.downloadDetails) UI.downloadDetails.innerHTML = detailHTML;
            
            if (totalWeights > 0) {
                const totalPercentage = Math.round((loadedWeights / totalWeights) * 100);
                if (allDone || totalPercentage >= 100) {
                    if (!isCompiling) {
                        isCompiling = true;
                        updateStatus('Compiling Engine...', null, 'Building shader operations. The browser may appear frozen for up to 60 seconds. Do not close the tab.');
                    }
                } else {
                    updateStatus('Downloading AI Weights...', totalPercentage, 'Caching model directly to your browser storage.');
                }
            }
        }

        function updateStatus(text, percentage, subtext = '') {
            // Defensive DOM updates to prevent crashes if UI elements are missing
            if (UI.statusText) {
                UI.statusText.innerHTML = (percentage === null || percentage < 100) 
                    ? `<i class="ph ph-spinner-gap animate-spin"></i> ${text}` 
                    : `<i class="ph-fill ph-check-circle text-emerald-400"></i> ${text}`;
            }
            
            if (UI.statusSubtext) {
                UI.statusSubtext.innerText = subtext;
            }

            if (UI.progressBar && UI.statusPercentage) {
                if (percentage !== null) {
                    UI.statusPercentage.innerText = `${percentage}%`;
                    UI.progressBar.style.width = `${percentage}%`;
                    UI.progressBar.classList.remove('loader');
                } else {
                    UI.statusPercentage.innerText = 'Processing...';
                    UI.progressBar.style.width = '100%';
                    UI.progressBar.classList.add('loader');
                }
            }
        }

        async function extractAudio(file) {
            console.log(`[Main] Reading file array buffer: ${file.name}`);
            updateStatus('Extracting Audio Track...', 0, 'Decoding media file...');
            UI.statusContainer.classList.remove('hidden');

            const arrayBuffer = await file.arrayBuffer();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            
            updateStatus('Resampling Audio...', 30, 'Downmixing to 16kHz...');
            console.log(`[Main] Sending to AudioContext decodeAudioData...`);
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * 16000, 16000);
            const source = offlineCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offlineCtx.destination);
            source.start();

            console.log(`[Main] Rendering offline audio context...`);
            const renderedBuffer = await offlineCtx.startRendering();
            updateStatus('Audio Ready.', 100, 'Sending to compute device...');
            return renderedBuffer.getChannelData(0);
        }

        UI.dropZone.addEventListener('click', () => { if(isWorkerReady) UI.fileInput.click() });
        UI.dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            if(isWorkerReady) UI.dropZone.classList.add('drag-active'); 
        });
        UI.dropZone.addEventListener('dragleave', () => UI.dropZone.classList.remove('drag-active'));
        UI.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            UI.dropZone.classList.remove('drag-active');
            if (isWorkerReady && e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        UI.fileInput.addEventListener('change', (e) => {
            if (isWorkerReady && e.target.files.length) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!isWorkerReady) {
                console.warn("[Main] File rejected: Engine is still locked/loading.");
                return alert('Please wait for the AI engine to finish loading.');
            }
            if (isProcessing) {
                console.warn("[Main] File rejected: Engine is currently busy transcribing.");
                return alert('Busy processing.');
            }
            
            const actualModel = UI.modelSelect.value === 'custom' ? UI.customModelInput.value.trim() : UI.modelSelect.value;
            if (!actualModel) return alert('Please enter a custom model ID.');

            console.log(`[Main] Handling file drop: ${file.name}. Locking UI.`);
            isProcessing = true;
            lockUI();
            UI.dropTitle.innerText = "Transcribing...";
            UI.dropSubtitle.innerText = "Do not close this tab.";
            if (UI.downloadDetails) UI.downloadDetails.innerHTML = ''; 
            
            finalTranscriptionResult = null;
            UI.outputContainer.classList.add('hidden');
            if (UI.progressBar) UI.progressBar.classList.remove('bg-red-500'); 
            
            try {
                const audioData = await extractAudio(file);
                worker.postMessage({ 
                    action: 'transcribe', 
                    audio: audioData,
                    model: actualModel,
                    computeDevice: UI.deviceSelect.value,
                    timestampMode: UI.timestampSelect.value,
                    lang: UI.langSelect.value
                });
            } catch (err) {
                console.error(`[Main Error] Audio extraction failed:`, err);
                updateStatus('Extraction Failed', 0, err.message);
                if (UI.progressBar) UI.progressBar.classList.add('bg-red-500');
                isProcessing = false;
                unlockUI();
            }
        }

        function handleTranscriptionComplete(result) {
            console.log(`[Main] Transcription complete! Rendering output.`);
            isProcessing = false;
            finalTranscriptionResult = result;
            updateStatus('Transcription Complete', 100, 'Ready for export.');
            unlockUI(); 

            UI.transcriptOutput.innerHTML = '';
            
            if (result.chunks && result.chunks.length > 0) {
                const isWordMode = UI.timestampSelect.value === 'word';
                
                if(isWordMode) {
                    const p = document.createElement('p');
                    p.className = "leading-loose";
                    result.chunks.forEach(chunk => {
                        const start = chunk.timestamp[0];
                        const span = document.createElement('span');
                        span.className = "hover:bg-blue-900/50 hover:text-blue-200 px-1 rounded transition-colors cursor-crosshair group relative inline-block";
                        span.innerText = chunk.text;
                        
                        const tooltip = document.createElement('span');
                        tooltip.className = "absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-800 text-blue-300 text-[10px] py-0.5 px-2 rounded opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-10 shadow-lg border border-slate-600";
                        tooltip.innerText = formatTimeSec(start, true);
                        span.appendChild(tooltip);
                        
                        p.appendChild(span);
                    });
                    UI.transcriptOutput.appendChild(p);
                } else {
                    result.chunks.forEach(chunk => {
                        const start = chunk.timestamp[0];
                        const end = chunk.timestamp[1] !== null ? chunk.timestamp[1] : start + 2.0;
                        const timeRange = `[${formatTimeSec(start, true)} -> ${formatTimeSec(end, true)}]`;
                        const div = document.createElement('div');
                        div.className = "flex gap-4 hover:bg-slate-800/50 p-1.5 rounded transition-colors border-b border-slate-800/50 last:border-0";
                        div.innerHTML = `<span class="text-blue-400 select-none shrink-0 w-36 text-xs mt-0.5">${timeRange}</span> <span class="text-slate-100">${chunk.text}</span>`;
                        UI.transcriptOutput.appendChild(div);
                    });
                }
            } else {
                UI.transcriptOutput.innerText = result.text;
            }
        }

        function formatTimeSec(seconds, ms = false) {
            if (seconds === null || seconds === undefined) return '00:00.00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            if (ms) {
                const milli = Math.floor((seconds % 1) * 100).toString().padStart(2, '0');
                return `${m}:${s}.${milli}`;
            }
            return `${m}:${s}`;
        }

        function generateSRT(chunks) {
            let srtContent = '';
            const toSRTTime = (timeInSeconds) => {
                if (timeInSeconds === null || timeInSeconds === undefined) timeInSeconds = 0;
                const hours = Math.floor(timeInSeconds / 3600);
                const minutes = Math.floor((timeInSeconds % 3600) / 60);
                const seconds = Math.floor(timeInSeconds % 60);
                const milliseconds = Math.floor((timeInSeconds % 1) * 1000);
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(milliseconds).padStart(3, '0')}`;
            };

            chunks.forEach((chunk, index) => {
                const start = toSRTTime(chunk.timestamp[0]);
                const end = toSRTTime(chunk.timestamp[1] !== null ? chunk.timestamp[1] : chunk.timestamp[0] + 1.0);
                
                srtContent += `${index + 1}\n`;
                srtContent += `${start} --> ${end}\n`;
                srtContent += `${chunk.text.trim()}\n\n`;
            });

            return srtContent;
        }

        document.getElementById('btn-download-srt').addEventListener('click', () => {
            if (!finalTranscriptionResult?.chunks) return;
            const srt = generateSRT(finalTranscriptionResult.chunks);
            const blob = new Blob([srt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transcript_${UI.deviceSelect.value}_${new Date().getTime()}.srt`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            if (!finalTranscriptionResult) return;
            navigator.clipboard.writeText(finalTranscriptionResult.text);
            const btn = document.getElementById('btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-check text-emerald-400"></i> Copied';
            setTimeout(() => btn.innerHTML = originalText, 2000);
        });

        // -------------------------------------------------------------------
        // HEADLESS API EXTENSION FOR AGENTS
        // -------------------------------------------------------------------
        window.WhisperAPI = {
            isReady: () => isWorkerReady && !isProcessing,
            
            transcribeFile: async (file, lang = 'en', model = null, timestampMode = 'word') => {
                const useModel = model || UI.modelSelect.value;
                if (!worker) initWorker();
                if (isProcessing) throw new Error("API: Engine busy.");
                
                return new Promise(async (resolve, reject) => {
                    isProcessing = true;
                    try {
                        const audioData = await extractAudio(file);
                        
                        const defaultHandler = worker.onmessage;
                        worker.onmessage = (e) => {
                            defaultHandler({data: e.data}); // Feed visual UI
                            if (e.data.status === 'complete') {
                                worker.onmessage = defaultHandler;
                                resolve(e.data.result);
                            } else if (e.data.status === 'error') {
                                worker.onmessage = defaultHandler;
                                reject(e.data.message);
                            }
                        };
                        worker.postMessage({ 
                            action: 'transcribe', 
                            audio: audioData, 
                            model: useModel, 
                            computeDevice: UI.deviceSelect.value,
                            timestampMode,
                            lang 
                        });
                    } catch (err) {
                        isProcessing = false;
                        reject(err);
                    }
                });
            },
            convertToSRT: (chunks) => generateSRT(chunks)
        };

        // Initialize on load
        window.addEventListener('DOMContentLoaded', async () => {
            console.log("[Main] Page Loaded. Initiating setup sequence.");
            await checkWebGPU();
            validateConfiguration('init');
            initWorker();
        });

    </script>
</body>
</html>
