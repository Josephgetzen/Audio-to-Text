<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Transcriber | Word-Level Whisper Engine</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .drag-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.05) !important; }
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 sm:px-6">

    <!-- Header -->
    <div class="max-w-4xl w-full flex flex-col gap-2 mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-white flex items-center justify-center gap-3">
            <i class="ph-fill ph-waves text-blue-500"></i> Local AI Transcriber
        </h1>
        <p class="text-slate-400 text-sm sm:text-base">High-Precision Offline Transcription • Word-Level Attentions</p>
    </div>

    <!-- Main Container -->
    <div class="max-w-4xl w-full bg-slate-800/80 backdrop-blur-sm rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        
        <div class="p-6 sm:p-8">
            <!-- Upload Zone -->
            <div id="drop-zone" class="border-2 border-dashed border-slate-600 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer transition-all hover:border-slate-500 hover:bg-slate-700/30 group mb-6">
                <div class="bg-slate-700/50 p-4 rounded-full mb-4 group-hover:scale-105 transition-transform">
                    <i class="ph ph-upload-simple text-4xl text-blue-400"></i>
                </div>
                <h3 class="text-xl font-medium mb-2">Click or Drag to Upload</h3>
                <p class="text-slate-400 text-sm text-center">Supports MP4, WebM, MP3, WAV.<br>Audio is natively extracted in your browser.</p>
                <input type="file" id="file-input" class="hidden" accept="audio/*,video/*">
            </div>

            <!-- Configuration Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                <!-- AI Model -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">AI Model</label>
                    <div class="relative">
                        <select id="model-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="Xenova/whisper-small" selected>Whisper Small (Recommended)</option>
                            <option value="Xenova/whisper-base">Whisper Base (Fastest)</option>
                            <option value="onnx-community/whisper-large-v3-turbo">Large-v3-Turbo (Phrase Only)</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                
                <!-- Timestamp Mode -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Timestamp Mode</label>
                    <div class="relative">
                        <select id="timestamp-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="word" selected>Word-Level (Cross-Attention)</option>
                            <option value="phrase">Phrase-Level (Standard SRT)</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <!-- Language -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Language</label>
                    <div class="relative">
                        <select id="lang-select" class="w-full appearance-none bg-slate-800 border border-slate-600 rounded-lg py-2 px-3 text-sm text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="en">English (Optimal)</option>
                            <option value="auto">Auto-Detect</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
            </div>

            <!-- UI Warning for Invalid Combinations -->
            <div id="warning-box" class="hidden mt-4 bg-amber-500/10 border border-amber-500/20 text-amber-400 px-4 py-3 rounded-lg text-sm flex items-start gap-3 transition-all">
                <i class="ph-fill ph-warning-circle text-lg mt-0.5"></i>
                <p id="warning-text">Warning Text</p>
            </div>

            <!-- Progress & Status Indicator -->
            <div id="status-container" class="hidden mt-6 bg-slate-900/80 rounded-xl p-5 border border-slate-700 shadow-inner">
                <div class="flex justify-between text-sm mb-3">
                    <span id="status-text" class="text-blue-400 font-medium flex items-center gap-2">
                        <i class="ph ph-spinner-gap animate-spin"></i> Preparing Engine...
                    </span>
                    <span id="status-percentage" class="text-slate-400 font-mono">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-full rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                </div>
                <p id="status-subtext" class="text-xs text-slate-500 mt-3 text-center h-4"></p>
            </div>

            <!-- Output Area -->
            <div id="output-container" class="hidden mt-8 border-t border-slate-700 pt-8 fade-enter">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i class="ph-fill ph-check-circle text-emerald-500"></i> Transcription Ready
                    </h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button id="btn-copy" class="flex-1 sm:flex-none px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                            <i class="ph ph-copy"></i> Copy Text
                        </button>
                        <button id="btn-download-srt" class="flex-1 sm:flex-none px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium text-white transition-colors flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                            <i class="ph ph-download-simple"></i> Download SRT
                        </button>
                    </div>
                </div>
                
                <div id="transcript-output" class="w-full max-h-96 bg-slate-900 rounded-xl border border-slate-700 p-5 overflow-y-auto text-slate-300 leading-relaxed text-sm font-mono space-y-2 shadow-inner custom-scrollbar">
                    <!-- Text chunks injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Web Worker Logic -->
    <script>
        const workerCode = `
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/dist/transformers.min.js';

            env.allowLocalModels = false;
            
            // Handle WASM Threads
            if (typeof SharedArrayBuffer !== 'undefined') {
                env.backends.onnx.wasm.numThreads = Math.min(navigator.hardwareConcurrency || 4, 8);
            } else {
                env.backends.onnx.wasm.numThreads = 1;
            }

            let transcriber = null;
            let currentLoadedModel = null;

            self.onmessage = async (e) => {
                const { action, audio, lang, model, timestampMode } = e.data;

                // Handle Engine Initialization dynamically
                if (action === 'init' || action === 'transcribe') {
                    if (model !== currentLoadedModel) {
                        try {
                            self.postMessage({ status: 'progress', info: { status: 'init', file: 'Switching Engine...' } });
                            transcriber = await pipeline('automatic-speech-recognition', model, {
                                device: 'wasm',
                                dtype: 'q8',
                                progress_callback: (info) => self.postMessage({ status: 'progress', info })
                            });
                            currentLoadedModel = model;
                            if (action === 'init') self.postMessage({ status: 'ready' });
                        } catch (err) {
                            self.postMessage({ status: 'error', message: err.message });
                            return;
                        }
                    } else if (action === 'init') {
                        self.postMessage({ status: 'ready' });
                    }
                }

                if (action === 'transcribe') {
                    try {
                        self.postMessage({ status: 'transcribing' });
                        
                        // Execute Audio Pipeline
                        const output = await transcriber(audio, {
                            chunk_length_s: 30,
                            stride_length_s: 5,
                            return_timestamps: timestampMode === 'word' ? 'word' : true, 
                            language: lang === 'auto' ? null : lang,
                            callback_function: (chunk) => {
                                self.postMessage({ status: 'chunk', data: chunk });
                            }
                        });

                        self.postMessage({ status: 'complete', result: output });
                    } catch (err) {
                        self.postMessage({ status: 'error', message: err.message });
                    }
                }
            };
        `;

        // -------------------------------------------------------------------
        // MAIN UI ORCHESTRATION
        // -------------------------------------------------------------------
        
        let worker;
        let isWorkerReady = false;
        let isProcessing = false;
        let finalTranscriptionResult = null;

        const UI = {
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            modelSelect: document.getElementById('model-select'),
            timestampSelect: document.getElementById('timestamp-select'),
            langSelect: document.getElementById('lang-select'),
            warningBox: document.getElementById('warning-box'),
            warningText: document.getElementById('warning-text'),
            statusContainer: document.getElementById('status-container'),
            statusText: document.getElementById('status-text'),
            statusSubtext: document.getElementById('status-subtext'),
            statusPercentage: document.getElementById('status-percentage'),
            progressBar: document.getElementById('progress-bar'),
            outputContainer: document.getElementById('output-container'),
            transcriptOutput: document.getElementById('transcript-output')
        };

        // UI Validation Logic (Prevents Large-v3 + Word Level combo)
        function validateConfiguration(changedElement) {
            UI.warningBox.classList.add('hidden');
            
            const isLargeModel = UI.modelSelect.value === 'onnx-community/whisper-large-v3-turbo';
            const isWordLevel = UI.timestampSelect.value === 'word';

            if (isLargeModel && isWordLevel) {
                UI.warningBox.classList.remove('hidden');
                
                if (changedElement === 'model') {
                    // User selected Large model, force switch timestamp to Phrase
                    UI.timestampSelect.value = 'phrase';
                    UI.warningText.innerHTML = "<b>Large-v3-Turbo</b> does not support Word-Level timestamps. Switched to Phrase-Level.";
                } else {
                    // User selected Word timestamp, force switch model to Small
                    UI.modelSelect.value = 'Xenova/whisper-small';
                    UI.warningText.innerHTML = "<b>Word-Level</b> requires cross-attentions. Switched model to <b>Whisper Small</b>.";
                }
            }
            
            // If model changed and idle, preload new weights
            if (changedElement === 'model' && !isProcessing && worker) {
                initWorker(false); 
            }
        }

        UI.modelSelect.addEventListener('change', () => validateConfiguration('model'));
        UI.timestampSelect.addEventListener('change', () => validateConfiguration('timestamp'));

        // Initialize Web Worker
        function initWorker(showUI = true) {
            if (!worker) {
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                worker = new Worker(URL.createObjectURL(blob), { type: 'module' });
                setupWorkerListeners();
            }

            if (showUI) {
                UI.statusContainer.classList.remove('hidden');
                updateStatus('Booting AI Engine...', 0, 'Downloading requested model weights (~200MB - 800MB)');
            }
            
            worker.postMessage({ 
                action: 'init',
                model: UI.modelSelect.value 
            });
        }

        function setupWorkerListeners() {
            worker.onmessage = (e) => {
                const { status, info, message, result } = e.data;

                switch(status) {
                    case 'progress': handleModelProgress(info); break;
                    case 'ready':
                        isWorkerReady = true;
                        updateStatus('AI Engine Ready.', 100, 'Model cached locally.');
                        setTimeout(() => { if(!isProcessing) UI.statusContainer.classList.add('hidden'); }, 1500);
                        break;
                    case 'transcribing':
                        updateStatus('Transcribing Audio...', null, 'Running cross-attention analysis (may take a few minutes).');
                        UI.transcriptOutput.innerHTML = ''; 
                        UI.outputContainer.classList.remove('hidden');
                        UI.outputContainer.classList.add('fade-enter-active');
                        break;
                    case 'complete': handleTranscriptionComplete(result); break;
                    case 'error':
                        updateStatus(`Engine Error`, 0, message);
                        UI.progressBar.classList.add('bg-red-500');
                        isProcessing = false;
                        break;
                }
            };
        }

        // Handle Download Progress
        let downloadTracker = {};
        function handleModelProgress(info) {
            if (info.status === 'init') {
                if (info.file === 'Switching Engine...') downloadTracker = {}; // Reset on model switch
                downloadTracker[info.file] = { total: 0, loaded: 0, percentage: 0 };
            } else if (info.status === 'progress') {
                downloadTracker[info.file] = info;
            } else if (info.status === 'done') {
                downloadTracker[info.file].percentage = 100;
            }

            let totalWeights = 0, loadedWeights = 0;
            for (const data of Object.values(downloadTracker)) {
                if(data.total) { totalWeights += data.total; loadedWeights += data.loaded; }
            }
            
            if (totalWeights > 0) {
                const totalPercentage = Math.round((loadedWeights / totalWeights) * 100);
                updateStatus('Downloading AI Engine...', totalPercentage, 'Caching weights for offline use.');
            }
        }

        function updateStatus(text, percentage, subtext = '') {
            UI.statusText.innerHTML = (percentage === null || percentage < 100) 
                ? `<i class="ph ph-spinner-gap animate-spin"></i> ${text}` 
                : `<i class="ph-fill ph-check-circle text-emerald-400"></i> ${text}`;
            
            UI.statusSubtext.innerText = subtext;

            if (percentage !== null) {
                UI.statusPercentage.innerText = `${percentage}%`;
                UI.progressBar.style.width = `${percentage}%`;
                UI.progressBar.classList.remove('loader');
            } else {
                UI.statusPercentage.innerText = 'Processing...';
                UI.progressBar.style.width = '100%';
                UI.progressBar.classList.add('loader');
            }
        }

        // Native Audio Extraction
        async function extractAudio(file) {
            updateStatus('Extracting Audio Track...', 0, 'Decoding media file natively...');
            UI.statusContainer.classList.remove('hidden');

            const arrayBuffer = await file.arrayBuffer();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            
            updateStatus('Resampling Audio...', 30, 'Downmixing to 16kHz Mono...');
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * 16000, 16000);
            const source = offlineCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(offlineCtx.destination);
            source.start();

            const renderedBuffer = await offlineCtx.startRendering();
            updateStatus('Audio Ready.', 100, 'Sending to WebAssembly engine...');
            return renderedBuffer.getChannelData(0); // Float32Array
        }

        // User Interactions
        UI.dropZone.addEventListener('click', () => UI.fileInput.click());
        UI.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); UI.dropZone.classList.add('drag-active'); });
        UI.dropZone.addEventListener('dragleave', () => UI.dropZone.classList.remove('drag-active'));
        UI.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            UI.dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        UI.fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (isProcessing) return alert('An audio file is already being processed.');
            
            isProcessing = true;
            finalTranscriptionResult = null;
            UI.outputContainer.classList.add('hidden');
            UI.progressBar.classList.remove('bg-red-500'); // Reset error state if any
            
            try {
                const audioData = await extractAudio(file);
                worker.postMessage({ 
                    action: 'transcribe', 
                    audio: audioData,
                    lang: UI.langSelect.value,
                    model: UI.modelSelect.value,
                    timestampMode: UI.timestampSelect.value
                });
            } catch (err) {
                updateStatus('Media Extraction Failed', 0, err.message);
                UI.progressBar.classList.add('bg-red-500');
                isProcessing = false;
            }
        }

        // Format Output
        function handleTranscriptionComplete(result) {
            isProcessing = false;
            finalTranscriptionResult = result;
            updateStatus('Transcription Complete', 100, 'Ready for export.');

            UI.transcriptOutput.innerHTML = '';
            
            if (result.chunks && result.chunks.length > 0) {
                // If Word-Level, render chunks as flowing inline text with hover timestamps
                const isWordMode = UI.timestampSelect.value === 'word';
                
                if(isWordMode) {
                    const p = document.createElement('p');
                    p.className = "leading-loose";
                    result.chunks.forEach(chunk => {
                        const start = chunk.timestamp[0];
                        const span = document.createElement('span');
                        span.className = "hover:bg-blue-900/50 hover:text-blue-200 px-1 rounded transition-colors cursor-crosshair group relative";
                        span.innerText = chunk.text;
                        
                        // Tooltip for exact timestamp
                        const tooltip = document.createElement('span');
                        tooltip.className = "absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-800 text-blue-300 text-[10px] py-0.5 px-2 rounded opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity";
                        tooltip.innerText = formatTimeSec(start, true);
                        span.appendChild(tooltip);
                        
                        p.appendChild(span);
                    });
                    UI.transcriptOutput.appendChild(p);
                } else {
                    // Phrase Level: Render traditional stacked list
                    result.chunks.forEach(chunk => {
                        const start = chunk.timestamp[0];
                        const end = chunk.timestamp[1] !== null ? chunk.timestamp[1] : start + 2.0;
                        const timeRange = `[${formatTimeSec(start)} -> ${formatTimeSec(end)}]`;
                        const div = document.createElement('div');
                        div.className = "flex gap-4 hover:bg-slate-800/50 p-1.5 rounded transition-colors border-b border-slate-800/50 last:border-0";
                        div.innerHTML = `<span class="text-blue-400 select-none shrink-0 w-32">${timeRange}</span> <span class="text-slate-100">${chunk.text}</span>`;
                        UI.transcriptOutput.appendChild(div);
                    });
                }
            } else {
                UI.transcriptOutput.innerText = result.text;
            }
        }

        function formatTimeSec(seconds, ms = false) {
            if (seconds === null || seconds === undefined) return '00:00';
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            if (ms) {
                const milli = Math.floor((seconds % 1) * 100).toString().padStart(2, '0');
                return `${m}:${s}.${milli}`;
            }
            return `${m}:${s}`;
        }

        // SRT Generation Standard (Works for both Word and Phrase level output chunks)
        function generateSRT(chunks) {
            let srtContent = '';
            const toSRTTime = (timeInSeconds) => {
                if (timeInSeconds === null || timeInSeconds === undefined) timeInSeconds = 0;
                const hours = Math.floor(timeInSeconds / 3600);
                const minutes = Math.floor((timeInSeconds % 3600) / 60);
                const seconds = Math.floor(timeInSeconds % 60);
                const milliseconds = Math.floor((timeInSeconds % 1) * 1000);
                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')},${String(milliseconds).padStart(3, '0')}`;
            };

            chunks.forEach((chunk, index) => {
                const start = toSRTTime(chunk.timestamp[0]);
                const end = toSRTTime(chunk.timestamp[1] !== null ? chunk.timestamp[1] : chunk.timestamp[0] + 1.0);
                
                srtContent += `${index + 1}\n`;
                srtContent += `${start} --> ${end}\n`;
                srtContent += `${chunk.text.trim()}\n\n`;
            });

            return srtContent;
        }

        // Action Buttons
        document.getElementById('btn-download-srt').addEventListener('click', () => {
            if (!finalTranscriptionResult?.chunks) return;
            const srt = generateSRT(finalTranscriptionResult.chunks);
            const blob = new Blob([srt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transcript_${UI.timestampSelect.value}_${new Date().getTime()}.srt`;
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            if (!finalTranscriptionResult) return;
            navigator.clipboard.writeText(finalTranscriptionResult.text);
            const btn = document.getElementById('btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-check text-emerald-400"></i> Copied';
            setTimeout(() => btn.innerHTML = originalText, 2000);
        });

        // Headless API
        window.WhisperAPI = {
            isReady: () => isWorkerReady && !isProcessing,
            transcribeFile: async (file, lang = 'en', model = 'Xenova/whisper-small', timestampMode = 'word') => {
                if (!worker) initWorker(false);
                if (isProcessing) throw new Error("API: Engine busy.");
                
                return new Promise(async (resolve, reject) => {
                    isProcessing = true;
                    try {
                        const audioData = await extractAudio(file);
                        const defaultHandler = worker.onmessage;
                        worker.onmessage = (e) => {
                            if (e.data.status === 'complete') {
                                worker.onmessage = defaultHandler;
                                isProcessing = false;
                                resolve(e.data.result);
                            } else if (e.data.status === 'error') {
                                worker.onmessage = defaultHandler;
                                isProcessing = false;
                                reject(e.data.message);
                            }
                        };
                        worker.postMessage({ action: 'transcribe', audio: audioData, lang, model, timestampMode });
                    } catch (err) {
                        isProcessing = false;
                        reject(err);
                    }
                });
            }
        };

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => initWorker(true));

    </script>
</body>
</html>
